<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>기록</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="js/jsbarcode.js"></script>
<style>
  :root{
    --mono:'IBM Plex Mono', ui-monospace, monospace;
    --paper:#ffffff;          /* 영수증 종이 = 완전 흰색 */
    --print:#1c1a17;          /* 인쇄 잉크 */
    --faint:#9a948a;
    --canvas:#ffffff;         /* 배경 = 순수 흰색 (확정). 어둡게는 토글로만 */
    --rule: rgba(28,26,23,.5);
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0; background:var(--canvas); color:var(--print); font-family:var(--mono);
    -webkit-font-smoothing:antialiased; transition:background .35s ease;
    font-variant-numeric:tabular-nums;
    display:flex; flex-direction:column; min-height:100vh;}
  body[data-theme="dark"]{ --canvas:#15120f; }

  /* 상단 컨트롤바 (시안 하네스) */
  .bar{display:flex; gap:8px; justify-content:center; align-items:center; padding:18px 16px 6px; flex-wrap:wrap;}
  .bar .seg{display:flex; gap:6px;}
  .bar button{cursor:pointer; font-family:var(--mono); font-size:11px; letter-spacing:.4px;
    padding:7px 14px; border-radius:999px; border:1px solid rgba(128,120,108,.5);
    background:transparent; color:var(--print); opacity:.7; transition:.15s;}
  body[data-theme="dark"] .bar button{ color:#e8e3da; border-color:rgba(180,172,160,.4);}
  .bar button:hover{opacity:1;}
  .bar button.on{background:var(--print); color:var(--paper); border-color:var(--print); opacity:1;}
  body[data-theme="dark"] .bar button.on{ background:#e8e3da; color:#15120f;}
  .bar .gap{width:18px}

  /* 16:9 스테이지 */
  .stage{flex:1; width:100%; max-width:1180px; margin:10px auto 0; aspect-ratio:16/9;
    min-height:0; overflow:auto; overflow-x:hidden; padding:40px 28px 64px; scrollbar-width:thin;}
  .stage::-webkit-scrollbar{width:8px; height:8px}
  .stage::-webkit-scrollbar-thumb{background:rgba(120,112,100,.35); border-radius:8px}

  /* ── 영수증 (평평한 흰 종이, 빼곡한 타입) ───────────── */
  .receipt{position:relative; width:300px; background:var(--paper); color:var(--print);
    font-size:11px; line-height:1.32; letter-spacing:-.1px; padding:24px 22px 26px;}
  body[data-theme="dark"] .receipt{ filter:drop-shadow(0 16px 32px rgba(0,0,0,.55));}
  /* 하프톤 그림자 — 부드러운 그림자 덩어리(단일 광원 — 위·왼쪽에서 빛이 와 그림자는 아래·오른쪽으로만)에
     도트 마스크를 씌우고, clip-path로 종이 자리만 정확히 구멍 낸다. 구멍 좌표는 인셋과 대칭이라
     (calc(100% - 인셋)) 종이 크기·패딩이 달라도 항상 정확히 맞는다. 위·왼쪽은 판 자체를 사실상
     늘리지 않아(1px) 그쪽으로 새어나갈 자리가 없다 — 광원 반대편에 그림자가 생기는 일이 없다.
     폭·도트 피치는 --shR/--shB/--shD 변수로 — 작은 종이는 그림자도 비례해 작게(아래 오버라이드). */
  .receipt, .mappaper, .peek{ --shR:10px; --shB:12px; --shD:2.6px; }
  .print, .rmini, .bundle .s1, .benv{ --shR:5px; --shB:6px; --shD:2px; }
  .receipt::after, .print::after, .rmini::after, .bundle .s1::after, .mappaper::after, .peek::after, .benv::after{
    content:""; position:absolute; pointer-events:none;
    top:-1px; left:-1px; right:calc(-1 * var(--shR)); bottom:calc(-1 * var(--shB));
    background:radial-gradient(ellipse 88% 82% at 76% 74%,
      rgba(20,14,8,.32), rgba(20,14,8,.15) 46%, rgba(20,14,8,.05) 70%, rgba(20,14,8,0) 88%);
    -webkit-mask-image:radial-gradient(circle, #000 calc(var(--shD) * .21), transparent calc(var(--shD) * .35));
    -webkit-mask-size:var(--shD) var(--shD);
    mask-image:radial-gradient(circle, #000 calc(var(--shD) * .21), transparent calc(var(--shD) * .35));
    mask-size:var(--shD) var(--shD);
    clip-path:polygon(evenodd, 0 0, 100% 0, 100% 100%, 0 100%,
      1px 1px, calc(100% - var(--shR)) 1px, calc(100% - var(--shR)) calc(100% - var(--shB)), 1px calc(100% - var(--shB)));}
  body[data-theme="dark"] .receipt::after, body[data-theme="dark"] .print::after,
  body[data-theme="dark"] .rmini::after, body[data-theme="dark"] .bundle .s1::after,
  body[data-theme="dark"] .mappaper::after, body[data-theme="dark"] .peek::after,
  body[data-theme="dark"] .benv::after{display:none;}
  body[data-theme="dark"] .peek{filter:drop-shadow(0 14px 28px rgba(0,0,0,.5));}

  .r-center{text-align:center}
  .r-wordmark{font-weight:700; font-size:22px; letter-spacing:.5px; line-height:1;}
  .r-tag{font-size:9.5px; letter-spacing:1.3px; line-height:1.5; margin-top:6px;}
  .r-meta{display:flex; justify-content:space-between; font-size:10.5px; margin-top:9px;}
  .rule{height:0; margin:6px 0; border-top:1px dashed var(--rule);}
  .rule.solid{border-top:1px solid var(--print); margin:7px 0;}
  .stars{text-align:center; letter-spacing:1px; font-size:10px; overflow:hidden; white-space:nowrap; line-height:1.1;}
  .sec{text-align:center; font-size:10px; letter-spacing:1.3px; line-height:1.5;}
  .li{display:flex; gap:8px; line-height:1.4;}
  .li .n{color:var(--faint)}
  .li .sub{color:var(--faint); font-size:10px;}
  .dots{letter-spacing:.5px}
  .kw{border-bottom:1px solid var(--print); cursor:pointer;}
  .kw:hover{background:rgba(201,162,39,.22)}
  .r-foot{font-size:10px; line-height:1.5; text-align:center;}
  .ascii{font-size:8.5px; line-height:1; white-space:pre; text-align:center; letter-spacing:0; opacity:.9; margin:2px 0;}
  .r-title{font-weight:600; font-size:13px; text-align:center; line-height:1.3; margin:4px 0 6px;}
  .r-note{margin:5px 1px; text-align:justify; line-height:1.45;}

  /* 사진 = 컬러 출력사진(프린트). 영수증 옆에 흩어 배치 */
  .scene{position:relative; width:760px; max-width:100%; margin:0 auto;}
  .scene > .receipt{margin:0 auto; z-index:2;}
  .print{position:absolute; width:178px; background:#fff; padding:9px 9px 11px; z-index:1;}
  body[data-theme="dark"] .print{ filter:drop-shadow(0 16px 32px rgba(0,0,0,.6)); }
  .print .img{height:150px; border-radius:1px; background-size:cover; background-position:center;}
  .print .cap{font-family:var(--mono); font-size:9px; color:#9a948a; text-align:center;
    margin-top:8px; letter-spacing:.3px;}

  /* 데일리 룩백 — 이동 미니맵 + 그날의 도장 */
  .map{margin:5px 0 2px}
  .map svg{width:100%; height:auto; display:block}
  .stamps{display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin:7px 0 3px;}
  .stamp{text-align:center}
  .stamp .ic{width:32px; height:32px; border-radius:50%; border:1.2px solid var(--print);
    display:flex; align-items:center; justify-content:center; margin:0 auto; color:var(--print);}
  .stamp .ic svg{width:17px; height:17px; display:block;}
  .stamp .lb{font-size:8px; color:var(--faint); margin-top:3px; letter-spacing:.2px;}
  .note-you{margin:7px 1px 9px; text-align:justify; line-height:1.6;}

  /* 홈 = 큰 영수증 하나 + 아래 미니 목록 */
  .single{display:flex; flex-direction:column; align-items:center; gap:26px;}
  .single .receipt{width:372px; font-size:11.5px;}
  .mini-list{width:372px; max-width:88vw;}
  .mini-list .mh{font-size:9.5px; letter-spacing:2px; color:var(--faint); text-align:center; padding:8px 0;}
  .mrow{display:grid; grid-template-columns:66px 1fr auto; gap:12px; align-items:baseline;
    padding:7px 6px; border-top:1px dashed var(--rule); cursor:pointer; transition:.12s; font-size:11px;}
  body[data-theme="dark"] .mrow{color:#e8e3da}
  .mrow:hover{background:rgba(128,120,108,.12)}
  .mrow .d{color:var(--faint)}
  .mrow .v{font-size:10px; color:var(--faint); text-align:right}
  .hint{display:none;}
  /* 모아보기 탭 안의 모드 인디케이터 — 평소엔 숨김, 호버·선택 시 하위 메뉴처럼 펼쳐짐 */
  .modeic{display:inline-flex; gap:5px; vertical-align:-1.5px; max-width:0; opacity:0;
    margin-left:0; overflow:hidden; transition:max-width .22s ease, opacity .18s ease, margin-left .22s ease;}
  #tabs button:hover .modeic, #tabs button.on .modeic{max-width:34px; opacity:1; margin-left:8px;}
  .modeic .mic{display:inline-flex; cursor:pointer; opacity:.35; transition:opacity .15s; flex:0 0 auto;}
  .modeic .mic:hover{opacity:.75;}
  .modeic .mic.cur{opacity:1;}

  /* 바코드 (영수증 하단) */
  .barcode{height:30px; margin:8px auto 0; width:78%;
    background:repeating-linear-gradient(90deg,
      var(--print) 0 1.5px, transparent 1.5px 4px,
      var(--print) 4px 5px,  transparent 5px 7px,
      var(--print) 7px 10px, transparent 10px 12px,
      var(--print) 12px 13px, transparent 13px 17px);}
  .bc-num{text-align:center; font-size:9px; letter-spacing:3.5px; color:var(--faint); margin:3px 0 4px;}

  /* 잠금 화면 — 비밀번호 입력 */
  .pw{display:flex; gap:8px; margin:11px 2px 5px; align-items:center;}
  .pw input{flex:1; min-width:0; border:0; border-bottom:1px dashed var(--rule); background:transparent;
    font-family:var(--mono); font-size:13px; letter-spacing:5px; color:var(--print);
    padding:5px 2px; outline:none; text-align:center;}
  .pw input::placeholder{color:var(--faint); opacity:.7}
  .pw button{font-family:var(--mono); font-size:10px; letter-spacing:1.5px; padding:6px 13px;
    border:1px solid var(--print); background:transparent; color:var(--print); cursor:pointer; transition:.15s;}
  .pw button:hover{background:var(--print); color:var(--paper);}

  /* 모아보기 — 영수증 다발(월) → 흩어보기 */
  .bshelf{display:flex; gap:44px; justify-content:center; align-items:flex-start; flex-wrap:wrap; padding:40px 10px 16px;}
  .bundle{position:relative; width:196px; height:160px; cursor:pointer; transition:transform .18s ease;}
  .bundle:hover{transform:translateY(-6px)}
  .bundle .sheet{position:absolute; inset:0; background:var(--paper);}
  .bundle .s1{padding:15px 16px; isolation:isolate;}
  .bundle .s1:before{content:""; position:absolute; top:9px; left:50%; width:5px; height:5px;
    border-radius:50%; background:rgba(28,26,23,.55); transform:translateX(-50%);}
  .pin{position:absolute; left:50%; top:-15px; transform:translateX(-50%); z-index:6; pointer-events:none;}
  .pin .phead{width:12px; height:12px; border-radius:50%; background:var(--print);
    box-shadow:0 2px 5px rgba(20,14,8,.4); margin:0 auto;}
  .pin .pneedle{width:1.7px; height:21px; margin:0 auto;
    background:linear-gradient(var(--print), rgba(28,26,23,.2));}
  .band{position:absolute; left:-11px; right:-11px; bottom:24px; height:25px; background:var(--paper);
    border:1px solid rgba(28,26,23,.22); box-shadow:0 3px 8px rgba(20,14,8,.14);
    display:flex; align-items:center; justify-content:center;
    font-size:8.5px; letter-spacing:2.5px; color:var(--faint);}
  /* 봉인된 달 = 반투명 트레싱지 봉투 (열린 달 = 핀 다발)
     광택·이음선 없음 — 종이가 겹치는 자리만 한 겹 더 뽀얗게 (청첩장 봉투 질감) */
  /* overflow:hidden은 안쪽 래퍼(.benv-in)가 맡는다 — .benv 자신은 열어둬야 하프톤 그림자가 밖으로 보인다 */
  .benv{position:relative; width:186px; height:252px; cursor:pointer;
    transition:transform .18s ease;
    background:rgba(255,255,255,.55); border:1px solid rgba(28,26,23,.14);
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.4);}
  .benv-in{position:absolute; inset:0; overflow:hidden;}
  .benv:hover{transform:translateY(-6px)}
  .benv .flap{position:absolute; left:-1px; right:-1px; top:-1px; height:64px; z-index:3;
    background:rgba(255,255,255,.48);
    clip-path:polygon(0 0, 100% 0, 50% 100%);
    filter:drop-shadow(0 1px 1px rgba(28,26,23,.07));}
  .benv .inner{position:absolute; left:16px; right:16px; top:22px; bottom:22px; background:#fff;
    box-shadow:0 3px 10px rgba(20,14,8,.07); padding:12px 11px; z-index:1;
    filter:blur(1.8px); opacity:.34;}
  .benv .inner.ghosted{padding:0;}
  .benv .inner .gl{height:5px; background:var(--print); opacity:.5; border-radius:1px; margin:6.5px 0;}
  .benv .label{position:absolute; right:9px; bottom:9px; z-index:5; background:#fff;
    border:1px solid rgba(28,26,23,.28); box-shadow:0 3px 8px rgba(20,14,8,.12);
    font-size:8.5px; color:var(--print); padding:5px 9px; letter-spacing:.8px;
    text-align:right; line-height:1.6;}
  .benv .label b{display:block; font-size:10.5px; letter-spacing:1px; font-weight:700;}
  body[data-theme="dark"] .benv{background:rgba(255,255,255,.10);
    border-color:rgba(255,255,255,.14); box-shadow:0 14px 26px rgba(0,0,0,.5);}
  body[data-theme="dark"] .benv .flap{background:rgba(255,255,255,.10); filter:none;}
  body[data-theme="dark"] .benv .inner{opacity:.6;}

  .rgrid{display:flex; flex-wrap:wrap; gap:22px; justify-content:center; max-width:860px; margin:8px auto 0;}
  .rmini{position:relative; width:178px; background:var(--paper); padding:13px 13px 15px; cursor:pointer;
    font-size:9.5px; line-height:1.35; transition:transform .15s ease; isolation:isolate;}
  .rmini:nth-child(3n){transform:rotate(.9deg)} .rmini:nth-child(3n+1){transform:rotate(-.8deg)}
  .rmini:hover{transform:rotate(0deg) translateY(-4px)}
  .rmini .t{font-weight:600; font-size:11px; margin:5px 0 4px; text-align:center; line-height:1.3;}
  .rmini .ex{color:var(--faint); display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; text-align:justify;}
  body[data-theme="dark"] .rmini, body[data-theme="dark"] .bundle .s1, body[data-theme="dark"] .mappaper{
    filter:drop-shadow(0 14px 28px rgba(0,0,0,.55));}

  /* 지도 — 다녀온 곳 */
  .mappaper{position:relative; width:680px; max-width:96%; margin:6px auto 0; background:var(--paper); color:var(--print);
    font-size:11px; padding:26px 26px 20px; isolation:isolate;}
  .mappaper svg{width:100%; height:auto; display:block; margin:4px 0;}
  .mapnode{cursor:pointer;}
  .mapnode:hover circle{fill:rgba(201,162,39,.22);}

  /* 선물 — 잠긴 구간 */
  .locked{color:var(--faint);}
  .locked .mask{letter-spacing:1.5px; opacity:.75;}

  .fine{font-size:8.5px; color:var(--faint); text-align:center; line-height:1.6; letter-spacing:.3px;}

  /* 시간 봉인 (사이트 기본 상태) — 실제 영수증이 초점 나간 것처럼.
     구성(구역·가로선)은 전부 그대로, 내용만 뭉게지게. 열리는 날이 가까울수록 또렷해진다. */
  .smudge{filter:blur(calc((1 - var(--dev,.1))*2.1px + 1.2px));
    opacity:calc(var(--dev,.1)*.45 + .35);
    pointer-events:none; user-select:none;}
  /* .printed(썸네일 행)는 현재 실빌드에서 안 쓰이는 경로지만 흐림값은 남겨둔다 — .drawn은
     아래에서 모자이크로 따로 처리(블러 없음 — 흐림을 얹으면 도트 경계가 뭉개져 모자이크의 결이 죽는다) */
  .smudge .printed{
    filter:blur(calc((1 - var(--dev,.1))*5px + 3px));
    opacity:calc(var(--dev,.1)*.3 + .48);}
  .smudge-in{display:inline-block; filter:blur(2px); opacity:.5; pointer-events:none;
    user-select:none; max-width:100%; overflow:hidden; white-space:nowrap; vertical-align:bottom;}
  .dcombo{display:flex; justify-content:space-between; align-items:baseline; margin:8px 1px 2px;}
  .dcombo b{font-size:15px; font-weight:500; letter-spacing:1px; font-variant-numeric:tabular-nums;}
  .dcombo span{font-size:8.5px; color:var(--faint); letter-spacing:.6px;}
  /* 생일·기념일 특별표시 — 헤더 아래 타이포 밴드 */
  .anniv{text-align:center; margin:7px 1px 2px; font-size:10px; letter-spacing:3px; color:var(--print);}

  /* 현상 중인 출력사진 — 우윳빛 베일이 경과율만큼 걷힌다 */
  .print.developing .img{position:relative; overflow:hidden;
    filter:saturate(calc(var(--dev,.1)*.85 + .15)) contrast(.8);}
  .print.developing .img:after{content:""; position:absolute; inset:0;
    background:linear-gradient(175deg, rgba(238,235,228,.96), rgba(213,207,196,.9));
    opacity:calc(1 - (var(--dev,.1)*.9));}
  .print.developing .cap{color:#b3ac9f;} /* 상태 라벨은 또렷하게 — 흐리면 의미 없음 */

  /* 기록 좌우 슬라이드 */
  .snav{position:absolute; top:200px; width:42px; height:42px; border-radius:50%;
    border:1px solid rgba(128,120,108,.45); background:var(--paper); color:var(--print);
    font-family:var(--mono); font-size:19px; line-height:1; cursor:pointer; opacity:.6;
    transition:.15s; z-index:4; filter:drop-shadow(0 3px 8px rgba(20,14,8,.12));}
  .snav:hover{opacity:1}
  .snav.l{left:-70px}  .snav.r{right:-70px}
  .snav[disabled]{opacity:.15; cursor:default}
  @keyframes slideL{from{opacity:0; transform:translateX(36px)}to{opacity:1; transform:none}}
  @keyframes slideR{from{opacity:0; transform:translateX(-36px)}to{opacity:1; transform:none}}
  .scene.sl{animation:slideL .22s ease}
  .scene.sr{animation:slideR .22s ease}

  /* 좌우의 이웃 영수증 — 컨테이너 자체가 한 장의 종이 (4변 또렷 + 그림자) */
  /* overflow:hidden은 이웃 종이 미리보기를 자르는 .peek-in이 맡는다 —
     .peek 자신은 안 잘리게 둬야 하프톤 그림자가 가장자리 밖으로 보인다 */
  .peek{position:absolute; top:26px; width:372px; height:460px;
    cursor:pointer; z-index:0; background:var(--paper);
    transition:transform .15s ease;}
  .peek.l{left:-242px; transform:rotate(-1.7deg) scale(.9); transform-origin:top right;}
  .peek.r{right:-242px; transform:rotate(1.5deg) scale(.9); transform-origin:top left;}
  .peek-in{pointer-events:none; position:absolute; inset:0; overflow:hidden;}
  .peek-in:after{content:""; position:absolute; inset:0;
    background:rgba(255,255,255,.48); transition:background .15s ease;}
  .peek:hover .peek-in:after{background:rgba(255,255,255,.28);}
  body[data-theme="dark"] .peek{filter:drop-shadow(0 14px 28px rgba(0,0,0,.5));}
  body[data-theme="dark"] .peek-in:after{background:rgba(21,18,15,.5);}
  body[data-theme="dark"] .peek:hover .peek-in:after{background:rgba(21,18,15,.32);}
  .peek .receipt{margin:0; filter:none;}
  @media (max-width:900px){
    .peek.l{left:-330px} .peek.r{right:-330px}
    .snav.l{left:4px} .snav.r{right:4px}
  }

  /* 관리자 잠금 해제 오버레이 */
  .ovl{position:fixed; inset:0; background:rgba(255,255,255,.78); z-index:50;
    display:none; align-items:center; justify-content:center;}

  .scene.wk{width:372px; max-width:96%; margin:0 auto;}

  /* 모아보기 — 펼쳐보기(핀터레스트 보드: 열별로 나눠 겹침 없이, 좌우·상하 여백) */

  .spread-board{overflow:auto; cursor:grab; user-select:none;

    height:calc(100vh - 205px); min-height:320px;
    scrollbar-width:none;} /* 무한 보드엔 끝이 없으니 스크롤바도 없다 */
  .spread-board::-webkit-scrollbar{display:none;}
  .stage:has(.spread-board){overflow:hidden;} /* 흩어보기에선 바깥 스크롤도 봉인 */
  .spread-board.drag .sitem{pointer-events:none;} /* 끄는 동안 호버 리프트로 깜빡이지 않게 */

  .spread .sitem{cursor:pointer; zoom:.5; transition:transform .15s ease;}
  .spread .sitem:hover{transform:translateY(-5px)}
  /* 흩어보기 미니에선 사진이 굵은 망점 인쇄로 — 축소돼도 인쇄물로 읽히게 */
  .spread .drawn .dfrm::after{background-size:4px 4px; opacity:.34;}
  .spread .drawn .dimg{filter:grayscale(1) brightness(1.24) contrast(1.18);}
  /* zoom .5가 블러를 절반으로 깎으므로 봉인 흐림을 2배 보정 — 미니에서도 안 읽히게 (.drawn은 모자이크라 해당 없음) */

  .mrail .mm .bar{display:inline-block; height:0; border-top:1px dotted var(--rule); vertical-align:middle; margin-right:5px;}
  .mrail .mm.on .bar{border-top-style:solid; border-top-color:var(--print);}

  /* 사진 = 영수증에 프린트된 흑백 이미지(감열 하프톤) — 일기 아래에 작게 */

  .printed .pimg:after{content:''; position:absolute; inset:0;
    background-image:radial-gradient(circle, rgba(0,0,0,.7) .6px, transparent 1px);

  .printed .pph:hover .pimg{filter:grayscale(1) contrast(1.08) brightness(1.08);}
  .printed .pcap{font-size:8px; color:var(--faint); text-align:center; margin-top:3px; letter-spacing:.2px;}

  /* 일기 문구 사이에 인쇄된 그림 — 실사진 흑백 고대비 raw 톤 (감열 인쇄 느낌) */
  .drawn{margin:11px 0 12px; cursor:pointer;}
  /* .dfrm = 자르는 창(고정 크기·overflow:hidden). .dimg(실제 <img>)는 그 안을 채우기만 —

  .drawn .dfrm{display:block; width:100%; height:208px; position:relative; overflow:hidden;}
  /* 테두리 없음 · 밝은 부분은 multiply로 종이에 녹아듦(배경 없는 인쇄물처럼) · 밝고 옅게 */
  .drawn .dimg{width:100%; height:100%; object-fit:cover; display:block;
    background-size:cover; background-position:center;
    filter:grayscale(1) brightness(1.36) contrast(1.08); mix-blend-mode:multiply;}

    background-image:radial-gradient(circle, rgba(0,0,0,.55) .4px, transparent .85px);

  .drawn .dcap{font-size:8px; color:var(--faint); text-align:center; margin-top:3px; letter-spacing:.2px;}
  body[data-theme="dark"] .drawn .dimg{mix-blend-mode:normal; filter:grayscale(1) brightness(.95) contrast(1.12);}
  /* 봉인 — CSS 하프톤: 원래 사진 데이터에서 CSS만으로 정석 망점을 만든다.

     규칙적인 도트 격자(5px)를 screen 블렌드로 얹고, 컨테이너 contrast 한 번으로 이진화 —
     어두운 곳일수록 점이 굵어지는 신문 망점. contrast는 컨테이너에만 한 번(이미지에 또 걸면
     블렌드 결과를 재차 밀어붙여 점 경계가 깨지고 테두리가 생긴다 — 실제로 겪은 버그). */
  .sealph, .smudge .drawn{opacity:calc(var(--dev,.1)*.25 + .62); pointer-events:none; user-select:none;}
  .sealph .dcap, .smudge .drawn .dcap{opacity:0;}
  .sealph .dfrm, .smudge .dfrm{background:#fff; filter:contrast(34); isolation:isolate;}
  .sealph .dfrm .dimg, .smudge .dfrm .dimg{
    filter:grayscale(1) blur(4px) brightness(1.06); mix-blend-mode:normal; transform:scale(1.08);}
  /* 다크 모드 기본 사진 규칙(body[data-theme] .drawn .dimg, 특정도 0,3,1)이 봉인 규칙(0,3,0)을
     이겨서 블러가 빠지면 원본 디테일이 그대로 망점에 찍힌다 — 명시적으로 다시 이겨준다 */
  body[data-theme="dark"] .sealph .dfrm .dimg, body[data-theme="dark"] .smudge .dfrm .dimg{
    filter:grayscale(1) blur(4px) brightness(1.06); mix-blend-mode:normal;}
  .sealph .dfrm::after, .smudge .dfrm::after,
  .spread .sealph .dfrm::after, .spread .smudge .dfrm::after{ /* .spread 텍스처 규칙(0,3,1)보다 우선 */
    content:''; position:absolute; inset:0; pointer-events:none; opacity:1;
    background-image:radial-gradient(circle, #000 .45px, #fff 2.45px);
    background-size:5px 5px; mix-blend-mode:screen;}
  /* 다크 모드에서도 영수증 종이는 흰색 — 반전 없이 라이트와 동일한 망점(간극 0) */
  body[data-theme="dark"] .sealph .dfrm, body[data-theme="dark"] .smudge .dfrm{

  /* 컬러 사진 라이트박스 = 폴라로이드(보존) */
  .lbwrap{display:flex; gap:22px; flex-wrap:wrap; justify-content:center; align-items:flex-start; max-width:92vw;}
  .lbprint{position:static; width:250px;}

  /* ── 잠금 화면 ── */
  .gate{position:fixed; inset:0; z-index:100; display:flex; align-items:center; justify-content:center;

  .gate-receipt{position:relative; width:100%; max-width:300px; background:var(--paper); color:var(--print);

  /* 하프톤 그림자 — design/desktop-mockup-v2.html .receipt::after와 동일 기법(부드러운 덩어리+도트 마스크+clip-path 구멍) */
  .gate-receipt::after{content:""; position:absolute; pointer-events:none;

  body[data-theme="dark"] .gate-receipt{filter:drop-shadow(0 16px 32px rgba(0,0,0,.55));}

  .pw{display:flex; flex-direction:column; gap:12px; margin:16px 2px 10px;}

  /* ── 사진: 부드러운 흑백 인쇄 · 원본 구도(크롭X) · 테두리 없음 ── */
  .drawn{position:relative; margin:13px 0; cursor:pointer; line-height:0;}
  .drawn .dimg{width:100%; height:210px; object-fit:cover; display:block; background:none; border:0;
    filter:grayscale(1) brightness(1.26) contrast(1.04); mix-blend-mode:multiply;}

  /* ── 사진 로딩 — 로딩 전엔 은은한 망점 네모, 로딩되면 스르륵 (깜빡임 방지) ── */
  [data-ph]:not(.phloaded){background-color:rgba(28,26,23,.045) !important;

  .drawn::after{content:""; position:absolute; inset:0; pointer-events:none;

(function(){

  function barcode(e){var d8=String(e.date).replace(/[-.]/g,''),s4=('000'+(e.seq||0)).slice(-4),hh=2166136261,_i;for(_i=0;_i<e.no.length;_i++){hh^=e.no.charCodeAt(_i);hh=(hh*16777619)>>>0;}var serial=d8+s4+('000000'+(hh>>>0).toString(16).toUpperCase()).slice(-6);return '<div class="bcwrap" title="'+_permalink(e.no)+' (클릭하면 링크 복사)" onclick="event.stopPropagation();COPYLINK(this,\''+e.no+'\')"><svg class="bc-code" data-code="'+_permalink(e.no)+'"></svg><div class="bc-num">'+serial+'</div></div>';}
  window.COPYLINK=function(el,no){var url=_permalink(no);var done=function(){var n=el.querySelector('.bc-num');if(n){var o=n.getAttribute('data-num')||n.textContent;if(!n.getAttribute('data-num'))n.setAttribute('data-num',o);n.textContent='링크 복사됨 ✓';setTimeout(function(){n.textContent=n.getAttribute('data-num');},1400);}};try{navigator.clipboard.writeText(url).then(done,done);}catch(x){done();}};

        + '<div class="r-meta" style="margin-top:3px"><span>일기 '+(e.note?e.note.length:0)+'자 · 사진 '+(e.photos?e.photos.length:0)+'</span><span>NO. '+e.no+'</span></div>')

  // 사진 소스 — 날짜에서 실제 파일 경로 자동 도출(../vault/attachments/YYYY-MM-DD_NN.jpg).
  //  p.src 있으면 우선, 없고 g만 있으면 그라디언트 폴백. (실빌드: GPS·EXIF 매칭)
  var PH_BLANK="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==";
  function psrc(e,i){ var p=(e.photos&&e.photos[i])||{};
    if(p.src) return p.src;
    if(p.file) return (window.__PH&&window.__PH[p.file])||PH_BLANK;
    return PH_BLANK; }
  function phattr(e,i){ var p=(e.photos&&e.photos[i])||{}; return p.file? ' data-ph="'+p.file+'"':''; }
  function pbg(e,i){ return "background-image:url('"+psrc(e,i)+"')"; }
  // 일기 문구 사이에 인쇄된 그림 한 장 (클릭하면 컬러 폴라로이드)
  function drawn(e, i, sealed){
    var p=e.photos[i];
    var clk= sealed? '' : ' onclick="event.stopPropagation();PHOTO(\''+e.no+'\','+i+')"';
    return '<figure class="drawn"'+clk+'><div class="dfrm"><img class="dimg" loading="lazy"'+phattr(e,i)+' src="'+psrc(e,i)+'" alt=""></div>'
      +'<figcaption class="dcap">'+p.c+'</figcaption></figure>';

  // 일기 본문을 문장 단위로 나눠 사진을 사이사이에 그림처럼 끼운다
  function noteWithPhotos(e, sealed){
    function C(html){ return sealed? '<div class="smudge">'+html+'</div>' : html; }
    if(!e.note) return (e.photos&&e.photos.length)?('<div class="rule"></div>'+(function(h){return sealed?'<div class="sealph">'+h+'</div>':h;})(e.photos.map(function(p,i){return drawn(e,i,sealed);}).join(''))):'';
    if(!e.photos || !e.photos.length)
      return '<div class="rule"></div>'+C('<div class="note-you">'+e.note+'</div>');
    var parts=e.note.split(/(?<=[.!?])\s+/).filter(function(s){return s.trim();});
    var n=parts.length, np=e.photos.length, insAfter={};
    for(var k=0;k<np;k++){
      var pos=Math.round((k+1)*n/(np+1));
      if(pos<1) pos=1;
      if(n>1 && pos>n-1) pos=n-1;
      (insAfter[pos]=insAfter[pos]||[]).push(k);
    }
    var out='', seg='';
    function flush(){ if(seg.trim()) out+=C('<div class="note-you">'+seg+'</div>'); seg=''; }
    for(var i=0;i<n;i++){
      seg+=parts[i]+' ';
      if(insAfter[i+1]) insAfter[i+1].forEach(function(pi){
        flush();
        out+= sealed? '<div class="sealph">'+drawn(e,pi,true)+'</div>' : drawn(e,pi,false);
      });
    }
    flush();
    return '<div class="rule"></div>'+out;
  }

  function printedRow(e, sealed){

      return '<div class="pph"'+clk+'><div class="pimg"'+phattr(e,i)+' style="'+pbg(e,i)+'"></div>'

  // 컬러 사진 라이트박스 — 폴라로이드 버전 보존, 클릭으로 컬러 열람
  window.PHOTO=function(no, idx){

  function prints(e, developing){

  // 시간 봉인 — 실제 영수증이 초점 나간 것처럼. (실빌드에선 같은 구조의 대역 데이터를 흐림)
  function dnum(d){var p=d.split('.').map(Number); return Date.UTC(p[0],p[1]-1,p[2])/86400000;}
  function devInfo(e){
    if(!e.unlock) return {frac:0, gone:0, left:"∞"};
    var a=dnum(e.sealFrom||e.date), b=dnum(e.unlock), t=dnum(TODAY);
    var total=Math.max(1,b-a), gone=Math.min(Math.max(t-a,0),total);
    return {frac:gone/total, gone:Math.round(gone), left:Math.max(0,Math.round(b-t))};

  function sealedReceipt(e){ return receipt(e, true); }

  var current=(entries[0]||{}).no;  // 최신 기록(맨 위)부터 시작 — 번호 바뀌어도 안전

      + railHtml

  // ── 주간 결산 — 주마다 자동으로 한 장씩 아카이빙 ────
  var curWeekIdx=0;
  function weekStartD(dateStr){ var q=dateStr.split('.').map(Number);
    var dt=new Date(Date.UTC(q[0],q[1]-1,q[2])); var dow=(dt.getUTCDay()+6)%7;
    dt.setUTCDate(dt.getUTCDate()-dow); return dt; }
  function fmtDt(dt){ return dt.getUTCFullYear()+'.'+('0'+(dt.getUTCMonth()+1)).slice(-2)+'.'+('0'+dt.getUTCDate()).slice(-2); }
  function weeksOf(){ var m={};
    entries.forEach(function(e){ var k=fmtDt(weekStartD(e.date)); (m[k]=m[k]||[]).push(e); });
    return Object.keys(m).sort().reverse().map(function(k){ return {k:k, list:m[k]}; }); }
  function weekStats(w){
    var open=w.list.filter(function(e){return admin||isOpen(e);});
    var ph=open.reduce(function(t,e){return t+(e.photos?e.photos.length:0);},0);
    var ivm=open.length? open.reduce(function(t,e){return t+e.iv;},0)/open.length : 0;
    var places=[];
    open.forEach(function(e){ (e.places||[e.pl]).forEach(function(q){
      if(q&&q!=='—'&&q!=='카톡'&&places.indexOf(q)<0) places.push(q); }); });
    var heavy=open.slice().sort(function(a,b){return b.iv-a.iv;})[0];
    return {n:w.list.length, openN:open.length, sealedN:w.list.length-open.length,
      ph:ph, iv:ivm, places:places.slice(0,5), heavy:heavy};
  }
  window.WNAV=function(d){ var ws=weeksOf();
    curWeekIdx=Math.min(Math.max(curWeekIdx+d,0),ws.length-1); render(); };
  function weekly(){
    function compare(label, nowV, nowT, lastV, lastT){
      var mx=Math.max(nowV,lastV)||1;

        +'<div class="li"><span class="sub" style="width:38px">이번</span><span style="flex:1; color:var(--print)">'+barbar(nowV)+'</span><span class="sub">'+nowT+'</span></div>'
        +'<div class="li"><span class="sub" style="width:38px">그전</span><span style="flex:1; color:var(--faint)">'+barbar(lastV)+'</span><span class="sub">'+lastT+'</span></div></div>';
    }
    var ws=weeksOf(); if(curWeekIdx>=ws.length) curWeekIdx=ws.length-1;

    var st=weekStats(w), sp=prev?weekStats(prev):null;
    var endD=weekStartD(w.k); endD.setUTCDate(endD.getUTCDate()+6);
    var range=w.k+' – '+fmtDt(endD).slice(5);
    var body='<div class="receipt" style="width:372px; font-size:11.5px">'
      + head(["한 주 — WEEKLY", range], undefined, "주간", "")

      + '<div class="rule"></div>'

      + '<div class="rule"></div>'
      + compare("기록", st.n, st.n+'편', sp?sp.n:0, sp?sp.n+'편':'—')
      + compare("사진", st.ph, st.ph+'장', sp?sp.ph:0, sp?sp.ph+'장':'—')
      + '<div class="rule"></div>'
      + '<div class="sec" style="color:var(--faint)">다녀온 곳 — PLACES</div>'
      + (st.places.length? pathmap(st.places)
         : '<div class="r-center" style="color:var(--faint); font-size:10px; margin:8px 0">이 주는 흐릿하거나, 집이거나</div>')
      + '<div class="rule"></div>'
      + '<div class="r-meta"><span>평균 무게</span><span class="dots">'+dots(Math.round(st.iv))+'</span></div>'
      + (st.heavy? '<div class="r-meta" style="margin-top:3px"><span>가장 무거웠던 날</span>'
          +'<span style="cursor:pointer" onclick="GO(\'single\',\''+st.heavy.no+'\')">'+st.heavy.date.slice(5)+' '+dots(st.heavy.iv)+'</span></div>':'')
      + (st.sealedN? '<div class="r-meta" style="margin-top:3px"><span>아직 흐림</span><span>'+st.sealedN+'편</span></div>':'')
      + stars()
      + '<div class="r-foot">'
      + (curWeekIdx<ws.length-1?'<span style="cursor:pointer" onclick="WNAV(1)">← 이전 주</span>':'<span style="color:var(--faint)">처음</span>')
      + '&ensp;·&ensp;'
      + (curWeekIdx>0?'<span style="cursor:pointer" onclick="WNAV(-1)">다음 주 →</span>':'<span style="color:var(--faint)">최근</span>')

    var wnav='<button class="snav l" onclick="WNAV(1)"'+(curWeekIdx>=ws.length-1?' disabled':'')+' aria-label="이전 주">‹</button>'

    return '<div class="single"><div class="hint">주간 · ← → · 스와이프로 주 넘기기 — '+(curWeekIdx+1)+' / '+ws.length+'</div>'
      +'<div class="scene wk">'+body+wnav+'</div></div>';
  }

  function index(){
    function _tally(a){var m={};a.forEach(function(x){if(x)m[x]=(m[x]||0)+1;});return Object.keys(m).map(function(k){return [k,m[k]];}).sort(function(p,q){return q[1]-p[1];});}
    var _ppl=[],_plc=[],_thm=[],_emo=[],_stm={};
    entries.forEach(function(e){
      (e.people||[]).forEach(function(p){_ppl.push(p);});
      if(e.pl&&e.pl!=='—') String(e.pl).split(/[·,\/\s]+/).forEach(function(x){if(x)_plc.push(x);});
      (e.kws||[]).forEach(function(k){_thm.push(k);});
      (e.mood||[]).forEach(function(m){_emo.push(m);});
      (rawStamps(e)||[]).forEach(function(s){var k=s[0]+' '+s[1];_stm[k]=(_stm[k]||0)+1;});
    });

      {ko:"감정 / EMOTION",items:_tally(_emo).slice(0,6)}
    ].filter(function(g){return g.items.length;});
    var _idxTotal=_tally(_ppl).length+_tally(_plc).length+_tally(_thm).length+_tally(_emo).length+_stamps.length;
    var max=Math.max(1, groups.reduce(function(mx,g){return Math.max(mx, g.items.reduce(function(m2,it){return Math.max(m2,it[1]);},0));},0));
    var blocks=groups.map(function(g){

  // ── 모아보기 — 영수증 다발(월) → 흩어보기 → 상세 ────
  function monthsOf(){
    var m={};
    entries.forEach(function(e){var k=e.date.slice(0,7); (m[k]=m[k]||[]).push(e);});

  window.SETSPREAD=function(v){ spread=v; bundleMonth=null; render(); };

  function spreadView(){
    // 벽돌쌓기 — 일단 한 줄로 그려서 실측 높이를 얻고, SPINIT이 꽉 찬 벽으로 다시 쌓는다
    var items=entries.map(function(e){
      var open=admin||isOpen(e);
      return '<div class="sitem" data-m="'+e.date.slice(0,7)+'" onclick="SPGO(\''+e.no+'\')">'+(open?receipt(e):sealedReceipt(e))+'</div>';
    }).join('');
    setTimeout(SPINIT,0);
    return '<div class="single"><div class="hint">잡아서 상하좌우로 끈다 · 좌우는 끝없이 이어진다 · 위의 달을 누르면 그리로</div>'
      +'<div class="sp-strip" id="spstrip"></div>'
      +'<div class="spread-board" id="spbd" onscroll="SPWRAP()" onpointerdown="SPDOWN(event)" onmousemove="SPHOVER(event)" onmouseleave="SPLEAVE()">'
      +'<div class="spread" id="spin"><div class="scol">'+items+'</div></div></div>';
  }
  // 실측 높이로 벽돌 패킹 → 월 스트립 → 순환 사본 → 오프스크린 렌더 생략
  window.SPINIT=function(){
    var bd=document.getElementById('spbd'), spin=document.getElementById('spin');
    if(!bd||!spin||spin.classList.contains('ready')) return;
    var nodes=Array.prototype.slice.call(spin.querySelectorAll('.sitem'));
    if(!nodes.length) return;
    var H=Math.max(1800, bd.clientHeight*4.8);
    // 시간순을 지키되, 앞뒤 6편 창 안에서 남은 자리에 꼭 맞는 걸 골라 끼운다(바닥 들쭉임 최소화)
    var queue=nodes.map(function(n){ return {n:n, h:n.getBoundingClientRect().height+11}; });
    var cols=[], col=[], h=0;
    while(queue.length){
      var pick=0;
      if(h>0){
        pick=-1;
        for(var i=0;i<Math.min(6,queue.length);i++){ if(h+queue[i].h<=H+30){ pick=i; break; } }
        if(pick===-1){ cols.push(col); col=[]; h=0; pick=0; }
      }
      var it=queue.splice(pick,1)[0]; col.push(it); h+=it.h;
    }
    if(col.length) cols.push(col);
    var frag=document.createDocumentFragment();
    cols.forEach(function(list){ var d=document.createElement('div'); d.className='scol';

      }
    });
    var adm=document.getElementById('adm');
    if(adm) adm.innerHTML=admin?'<button class="on" onclick="RELOCK()">전체 열람 중 · 잠그기</button>':'';
  }
  function build(){
    var t=document.getElementById('tabs');
    t.innerHTML=screens.map(function(s){return '<button data-s="'+s[0]+'">'+s[1]+'</button>';}).join('');
    t.querySelectorAll('button').forEach(function(b){b.onclick=function(){
      if(b.dataset.s==='bundles'){
        if(state.s==='bundles' && !bundleMonth){ spread=!spread; render(); document.getElementById('vp').scrollTo({top:0,behavior:'smooth'}); }
        else { spread=false; GO('bundles'); }
      } else GO(b.dataset.s);
    };});
    var tb=document.getElementById('themebtn');
    function paintTheme(){ try{localStorage.setItem('theme',state.theme);}catch(e){} document.body.dataset.theme=state.theme; tb.innerHTML=bulbSvg(state.theme==='dark'); }
    tb.onclick=function(){ state.theme=(state.theme==='dark')?'light':'dark'; paintTheme(); };
    paintTheme();
    document.addEventListener('keydown', function(ev){
      if(ev.key==='Escape'){OVERLAY(false); var lb=document.getElementById('lb'); if(lb){lb.className='ovl'; lb.innerHTML='';} return;}
      if(state.s==='single'){ if(ev.key==='ArrowRight') NAV(1); if(ev.key==='ArrowLeft') NAV(-1); }
      else if(state.s==='weekly'){ if(ev.key==='ArrowRight') WNAV(-1); if(ev.key==='ArrowLeft') WNAV(1); }
    });
    // 모바일 스와이프 (기록·주간)
    var vp=document.getElementById('vp'), tx=0, ty=0;
    if(vp&&vp.addEventListener){
      vp.addEventListener('touchstart', function(ev){
        var t=ev.touches[0]; tx=t.clientX; ty=t.clientY;
      }, {passive:true});
      vp.addEventListener('touchend', function(ev){
        var t=ev.changedTouches[0], dx=t.clientX-tx, dy=t.clientY-ty;
        if(!(Math.abs(dx)>48 && Math.abs(dx)>Math.abs(dy)*1.5)) return;
        if(state.s==='single') NAV(dx<0?1:-1);
        else if(state.s==='weekly') WNAV(dx<0?-1:1);
      }, {passive:true});
    }
  }
  window.__BOOT__=function(list){ if(window.__NOW__) TODAY=window.__NOW__; entries=(list&&list.length?list:[]); current=(entries[0]||{}).no; landing(); build(); render(); };
})();
</script>

<script type="module">
  import { decryptContent } from "./js/crypto.js";
  const $ = (s) => document.querySelector(s);
  const WD = ["일","월","화","수","목","금","토"];

  // 본문(## 한 일 / ## 일기) 분리 → log[[text,""]], note
  function splitBody(body) {
    const src = body || "";
    const logM = src.match(/##\s*한 일\s*\n([\s\S]*?)(?=\n##|$)/);
    const noteM = src.match(/##\s*일기\s*\n([\s\S]*)$/);
    const log = logM
      ? logM[1].split("\n").map((s) => s.trim()).filter((s) => s.startsWith("-")).map((s) => [s.replace(/^-\s*/, ""), ""])
      : [];
    let note = noteM ? noteM[1].trim() : "";
    if (!logM && !noteM) note = src.trim();
    return { log, note };
  }

  // 매니페스트 카드 → 목업 entry
  function cardsToEntries(cards) {
    var _arr = (cards || [])
      .filter((c) => c.date)
      .slice()
      .sort((a, b) => b.date.localeCompare(a.date)) // 최신 먼저
      .map((c) => {
        const dot = c.date.replace(/-/g, ".");
        const wd = WD[new Date(c.date + "T00:00:00").getDay()];
        const { log, note } = splitBody(c.body);
        const photos = (c.photos || []).map((p) => ({
          src: p.src || null,
          file: p.file || null,
          mime: p.mime || "image/jpeg",
          c: [c.location || "", dot.slice(5)].filter(Boolean).join(" · "),
        }));
        const iv = Math.max(1, Math.min(5,
          1 + Math.min(3, Math.round(note.length / 220)) + Math.min(2, Math.ceil((c.photos ? c.photos.length : 0) / 3))));
        const empty = c.title === dot;
        return {
          no: c.id, date: dot, wd, time: c.time || "", pl: c.location || "—",
          iv, unlock: c.unlock ? c.unlock.replace(/-/g, ".") : null,
          sealFrom: c.sealFrom ? c.sealFrom.replace(/-/g, ".") : null,
          t: empty ? "" : (c.title || ""), geo: c.location || "",
          places: c.places || [],
          log, note, kws: c.tags || [], people: c.people || [], mood: c.mood || [], photos,
          sky: c.sky || "", temp: c.temp || "", hum: c.hum || "",
        };
      });
    _arr.forEach(function (e, i) { e.seq = _arr.length - i; }); // 연대순 일련번호(오래된=1)
    return _arr;
  }

  // 게이트 테마 토글 (목업 전구 아이콘, body[data-theme] 사용) — localStorage 복원·저장
  (function () {
    try { const t = localStorage.getItem("theme"); if (t) document.body.dataset.theme = t; } catch (e) {}
    const btn = $("#gate-theme");
    function bulb(on) {
      return '<svg viewBox="0 0 24 24" width="13" height="13" fill="' + (on ? "currentColor" : "none") +
        '" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">' +
        '<path d="M8.5 15.2a6 6 0 1 1 7 0c-.75.6-1 1.2-1 2.3h-5c0-1.1-.25-1.7-1-2.3z"/>' +
        '<path d="M9.5 20h5M10.5 22h3" fill="none"/></svg>';
    }
    function paint() { btn.innerHTML = bulb(document.body.dataset.theme === "dark"); }
    btn.addEventListener("click", function () {
      document.body.dataset.theme = document.body.dataset.theme === "dark" ? "light" : "dark";
      try { localStorage.setItem("theme", document.body.dataset.theme); } catch (e) {}
      paint();
    });
    paint();
  })();

  // 복호화 게이트
  const fmtSeoul = (d) => { try { return new Intl.DateTimeFormat("sv-SE", { timeZone: "Asia/Seoul" }).format(d).replace(/-/g, "."); } catch { return d.toISOString().slice(0, 10).replace(/-/g, "."); } };
  let encText;
  try {
    const res = await fetch("content.enc");
    if (!res.ok) throw new Error();
    // 열림 판정은 기기 시계가 아니라 서버 시각으로 — 시계 돌리기 무력화
    const sd = res.headers.get("date");
    window.__NOW__ = fmtSeoul(sd ? new Date(sd) : new Date());
    const cl = fmtSeoul(new Date());
    if (Math.abs(Date.parse(cl.replace(/\./g, "-")) - Date.parse(window.__NOW__.replace(/\./g, "-"))) >= 2 * 86400000)
      tattle("clock", "기기 시계가 서버와 다름 (기기 " + cl + " · 서버 " + window.__NOW__ + ")");
    encText = await res.text();
  } catch {
    $("#gate-error").textContent = "콘텐츠를 불러오지 못했어요. npm run build 를 먼저 실행했는지 확인해줘.";
    $("#gate-error").hidden = false;
  }

  async function derivePhotoKey(pw, salt) {
    const enc = new TextEncoder();
    const bk = await crypto.subtle.importKey("raw", enc.encode(pw), "PBKDF2", false, ["deriveKey"]);
    return crypto.subtle.deriveKey(
      { name: "PBKDF2", salt: enc.encode(salt), iterations: 200000, hash: "SHA-256" },
      bk, { name: "AES-GCM", length: 256 }, false, ["decrypt"]
    );
  }

  async function unlock(pw) {
    const manifest = await decryptContent(encText, pw); // 틀리면 throw
    window.__ADMIN_HASH__ = (manifest.site && manifest.site.adminHash) || null;
    const entries = cardsToEntries(manifest.cards);
    window.__PHMIME = {};
    entries.forEach((en) => (en.photos || []).forEach((p) => { if (p.file) window.__PHMIME[p.file] = p.mime || "image/jpeg"; }));
    window.__PHKEY = await derivePhotoKey(pw, (manifest.site && manifest.site.photoSalt) || "girok-photos-v1");
    sessionStorage.setItem("pw", pw);
    const g = $("#gate"); if (g) g.remove();
    window.__BOOT__(entries);
    var _eid = new URLSearchParams(location.search).get("e");
    if (_eid && window.GO) window.GO("single", _eid);
    (function(){var vp=document.getElementById("vp");if(!vp||vp.__bcobs)return;vp.__bcobs=1;function fill(){if(!window.JsBarcode)return;vp.querySelectorAll("svg.bc-code:empty").forEach(function(el){try{window.JsBarcode(el,el.getAttribute("data-code"),{format:"CODE128",width:1,height:34,margin:0,displayValue:false,lineColor:"#1c1a17",background:"transparent"});var w=parseFloat(el.getAttribute("width")),h=parseFloat(el.getAttribute("height"));if(w&&h){el.setAttribute("viewBox","0 0 "+w+" "+h);el.setAttribute("preserveAspectRatio","none");el.removeAttribute("width");el.removeAttribute("height");}}catch(e){}});}new MutationObserver(fill).observe(vp,{childList:true,subtree:true});fill();vp.addEventListener("click",function(ev){var d=ev.target&&ev.target.closest&&ev.target.closest(".mapnode");if(d&&d.getAttribute("data-no")&&window.GO){ev.stopPropagation();window.GO("single",d.getAttribute("data-no"));}});})();
  }

  const saved = sessionStorage.getItem("pw");
  if (saved) { try { await unlock(saved); } catch { sessionStorage.removeItem("pw"); } }

  const form = $("#gate-form");
  if (form) {
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const pw = $("#gate-input").value;
      $("#gate-error").hidden = true;
      $("#gate-btn").textContent = "여는 중…";
      try { await unlock(pw); }
      catch {
        $("#gate-error").textContent = "비밀번호가 맞지 않아요";
        $("#gate-error").hidden = false;
        $("#gate-btn").textContent = "열기";
        $("#gate-input").select();
      }
    });
    $("#gate-input").focus();
  }

  // ── 사진 지연 로딩 — [data-ph] 요소를 발견하면 photos/<해시>.enc 받아서 복호화 ──
  window.__PH = {};
  const phBusy = {};
  async function phload(file) {
    if (!window.__PHKEY || window.__PH[file] || phBusy[file]) return;
    phBusy[file] = 1;
    try {
      const r = await fetch(file);
      if (!r.ok) throw 0;
      const buf = new Uint8Array(await r.arrayBuffer());
      const pt = await crypto.subtle.decrypt({ name: "AES-GCM", iv: buf.slice(0, 12) }, window.__PHKEY, buf.slice(12));
      window.__PH[file] = URL.createObjectURL(new Blob([pt], { type: (window.__PHMIME || {})[file] || "image/jpeg" }));
      phApply(file);
    } catch (e) { phBusy[file] = 0; }
  }
  function phApply(file) {
    const url = window.__PH[file];
    document.querySelectorAll("[data-ph]").forEach((el) => {
      if (el.getAttribute("data-ph") !== file || el.classList.contains("phloaded")) return;
      if (el.tagName === "IMG") el.src = url;
      else el.style.backgroundImage = "url('" + url + "')";
      el.classList.add("phloaded");
    });
  }
  function phSweep() {
    document.querySelectorAll("[data-ph]").forEach((el) => {
      const f = el.getAttribute("data-ph");
      if (!f) return;
      if (window.__PH[f]) phApply(f); else phload(f);
    });
  }
  new MutationObserver(phSweep).observe(document.body, { childList: true, subtree: true });

  // ── 봉인 감시 — 조작이 감지되면 월하에게 푸시(ntfy) + 화면에 한 줄 ──
  const NTFY = "https://ntfy.sh/girok-hyunsang-x9k42mprw7";
  function tattle(kind, msg) {
    if (window.__ADM__) return;
    try { if (sessionStorage.getItem("tt_" + kind)) return; sessionStorage.setItem("tt_" + kind, "1"); } catch (e) {}
    try { fetch(NTFY, { method: "POST", headers: { Title: "girok seal", Priority: "high", Tags: "rotating_light" },
      body: msg + " — " + new Date().toLocaleString("ko-KR") }); } catch (e) {}
    warnLine();
  }
  function warnLine() {
    if (document.getElementById("tattle-warn")) return;
    const d = document.createElement("div");
    d.id = "tattle-warn";
    d.textContent = "현상 중인 기록을 억지로 열면 빛이 새요 — 이 일은 월하에게 전해집니다.";
    d.style.cssText = "position:fixed;left:50%;bottom:26px;transform:translateX(-50%);z-index:200;"
      + "background:var(--paper,#fff);color:var(--print,#1a1a1a);border:1px solid currentColor;padding:9px 14px;"
      + "font-family:var(--mono,monospace);font-size:10.5px;letter-spacing:.3px;box-shadow:0 8px 20px rgba(0,0,0,.18);"
      + "max-width:88vw;text-align:center";
    document.body.appendChild(d);
    setTimeout(() => d.remove(), 9000);
  }
  // 흐림(블러)이 강제로 벗겨진 화면 감지
  setInterval(() => {
    if (window.__ADM__) return;
    const s = document.querySelector(".receipt .smudge");
    if (s && (getComputedStyle(s).filter || "").indexOf("blur") === -1)
      tattle("blur", "봉인 흐림이 해제된 화면이 감지됨");
  }, 6000);
  // 개발자도구 감지 — 콘솔이 이 요소를 그리는 순간 getter가 발동
  (function () {
    const probe = new Image();
    Object.defineProperty(probe, "id", { get: function () { tattle("devtools", "개발자도구가 열림"); return ""; } });
    console.log(probe);
  })();
</script>
